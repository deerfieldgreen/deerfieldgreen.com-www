name = "deerfieldgreen-www"
compatibility_date = "2026-03-30"

routes = [
  { pattern = "deerfieldgreen.com/*", zone_name = "deerfieldgreen.com" },
  { pattern = "www.deerfieldgreen.com/*", zone_name = "deerfieldgreen.com" },
  { custom_domain = true, pattern = "deerfieldgreen.com", override_existing_origin = true, override_existing_dns_record = true },
  { custom_domain = true, pattern = "www.deerfieldgreen.com", override_existing_origin = true, override_existing_dns_record = true }
]

[assets]
directory = "./_site"
